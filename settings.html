<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOS - Settings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-contain">
        <!-- Minimal Sidebar -->
        <aside class="sidebar">
            <img src="logo.png" alt="VIT-AP" class="logo-img">
            <div class="logo">DevOS</div>

            <div class="nav-group">
                <h3 class="nav-label">Workspace</h3>
                <nav class="nav-menu">
                    <a href="dashboard.html" class="nav-item">Dashboard</a>
                    <a href="focus.html" class="nav-item">Focus Mode</a>
                    <a href="tasks.html" class="nav-item">Tasks</a>
                    <a href="notes.html" class="nav-item">Notes</a>
                </nav>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-group">
                <h3 class="nav-label">Manage</h3>
                <nav class="nav-menu">
                    <a href="archive.html" class="nav-item">Archive</a>
                    <a href="settings.html" class="nav-item active">Settings</a>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1>Settings</h1>
                <p class="subtitle">Manage preferences</p>
            </header>

            <div class="content-stack">

                <!-- Profile -->
                <section class="content-block">
                    <h2 class="section-title">PROFILE</h2>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" class="form-input" value="Developer">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-input" value="dev@example.com">
                    </div>
                </section>

                <!-- Appearance -->
                <section class="content-block">
                    <h2 class="section-title">APPEARANCE</h2>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="theme" checked> Light
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="theme"> Dark (Pro)
                        </label>
                    </div>
                </section>

                <!-- Notifications -->
                <section class="content-block">
                    <h2 class="section-title">NOTIFICATIONS</h2>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" checked> Email Digest
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox"> Desktop Alerts
                        </label>
                    </div>
                </section>

                <button class="btn-save">Save Changes</button>

            </div>
        </main>
    </div>

</body>

</html>
